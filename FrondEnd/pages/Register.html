<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css"> <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .register-card h2 {
            margin-bottom: 10px;
            font-size: 26px;
            color: #1e293b;
        }
        .register-card p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #475569;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #3f51b5;
        }
        .btn-register {
            width: 100%;
            padding: 14px;
            background-color: #3f51b5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn-register:hover {
            background-color: #303f9f;
        }
        .register-footer {
            margin-top: 25px;
            font-size: 14px;
            color: #64748b;
        }
        .register-footer a {
            color: #3f51b5;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Tạo tài khoản</h2>
        <p>Bắt đầu hành trình học tập của bạn</p>

        <form id="registerForm">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="reg-name" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="reg-password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="reg-confirm" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-register">Đăng ký ngay</button>
        </form>

        <div class="register-footer">
            Bạn đã có tài khoản? <a href="../index.html">Đăng nhập</a>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
